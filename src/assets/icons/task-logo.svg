<svg
  width="48"
  height="48"
  viewBox="0 0 48 48"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- White app container -->
  <rect
    x="5"
    y="5"
    width="38"
    height="38"
    rx="12"
  />

  <!-- Task dots -->
  <circle cx="16" cy="18" r="3" fill="url(#themeGradient)" />
  <circle cx="16" cy="26" r="3" fill="url(#themeGradient)" opacity="0.85" />
  <circle cx="16" cy="34" r="3" fill="url(#themeGradient)" opacity="0.7" />

  <!-- Task lines -->
  <rect x="22" y="16.5" width="14" height="3" rx="1.5" fill="url(#themeGradient)" />
  <rect x="22" y="24.5" width="10" height="3" rx="1.5" fill="url(#themeGradient)" opacity="0.85" />
  <rect x="22" y="32.5" width="6" height="3" rx="1.5" fill="url(#themeGradient)" opacity="0.7" />

  <!-- Gradient -->
  <defs>
    <linearGradient id="themeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6a8dff" />
      <stop offset="100%" stop-color="#5a6cff" />
    </linearGradient>
  </defs>
</svg>
